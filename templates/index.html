<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YomuTomo</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="alternate icon" href="/static/favicon.ico" />
    <link rel="stylesheet" href="/static/css/main.css" />
  </head>
  <body>
    <div class="container">
      {% include "partials/global_nav.html" %}
      {% include "partials/global_settings_modal.html" %}

      <main class="main-content">
        <section class="card input-card">
          <h2>📝 输入课文</h2>
          <form id="text-form" action="/process_text" method="post">
            <div class="input-group">
              <textarea id="text" name="text" rows="8" required></textarea>
              <label for="text">日语课文</label>
            </div>
            <input type="hidden" id="model" name="model" value="" />
            <button type="submit" class="btn-primary">🚀 开始练习</button>
          </form>
        </section>
      </main>

    </div>
    <script>
      // 处理表单提交，显示loading页面
      document.getElementById('text-form').addEventListener('submit', function(e) {
        e.preventDefault(); // 阻止默认提交

        const text = document.getElementById('text').value.trim();
        if (!text) {
          showToast('请输入日语课文', 'warning');
          return;
        }

        // 保存数据到sessionStorage
        sessionStorage.setItem('processing_text', text);
        sessionStorage.setItem('processing_model', document.getElementById('model').value);

        // 重定向到loading页面
        window.location.href = '/loading';
      });

      // 从配置中获取模型设置（统一使用 aiConfig 键）
      document.addEventListener('DOMContentLoaded', function() {
        let config = {};
        try {
          config = JSON.parse(localStorage.getItem('aiConfig') || '{}');
        } catch (e) {}
        // Populate hidden model input with configured model (supports custom input)
        try {
          const modelInput = document.getElementById('model');
          if (modelInput && config.model) modelInput.value = config.model;
        } catch (e) { console.error('设置隐藏 model 失败', e); }
        if (config && config.model) {
          const modelInput = document.getElementById('model');
          if (modelInput) modelInput.value = config.model;
        }

      });
    </script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/modules/ai-config.js"></script>
    <script src="/static/js/modules/settings-modal.js"></script>
    <script src="/static/js/modules/speech-recognition.js"></script>
    <script src="/static/js/modules/text-highlight.js"></script>
    <script src="/static/js/modules/pdf-export.js"></script>
    <script src="/static/js/new_script.js"></script>
    <script src="/static/js/pages/home.js"></script>
  </body>
</html>
