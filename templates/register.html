<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>注册 - YomuTomo</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="alternate icon" href="/static/favicon.ico" />
    <link rel="stylesheet" href="/static/css/main.css" />
  </head>
  <body>
    <div class="container">
      {% include "partials/global_nav.html" %}

      <main class="main-content">
        <section class="card input-card">
          <h2>📝 注册</h2>
          {% if error %}
          <p style="color: #e74c3c">{{ error }}</p>
          {% endif %}
          <form method="post" action="/register" autocomplete="on">
            <div class="input-group">
              <input type="email" name="email" id="email" autocomplete="username email" required />
              <label for="email">邮箱</label>
            </div>
            <div class="input-group">
              <input type="password" name="password" id="password" autocomplete="new-password" required />
              <label for="password">密码</label>
            </div>
            <div class="input-group">
              <input type="password" name="confirm_password" id="confirm_password" autocomplete="new-password" required />
              <label for="confirm_password">确认密码</label>
            </div>
            <button type="submit" class="btn-primary">注册</button>
          </form>
          <p style="margin-top: 12px">已有账户？<a href="/login">去登录</a></p>
        </section>
      </main>
    </div>
    <script src="/static/js/pages/register.js"></script>
  </body>
</html>
