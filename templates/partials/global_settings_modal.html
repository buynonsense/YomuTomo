{% if user %}
<div id="settings-modal"
     class="modal"
     aria-hidden="true"
     x-data="settingsModal()"
     x-bind:aria-hidden="!isOpen"
     x-bind:class="{ 'show': isOpen }"
     x-on:keydown.escape.window="if (isOpen) close()"
     x-on:htmx:after-request.window="handleHtmxAfterRequest($event)">
  <div class="modal-content settings-modal-content"
       x-show="isOpen"
       x-transition:enter="modal-enter"
       x-transition:enter-start="modal-enter-start"
       x-transition:enter-end="modal-enter-end"
       x-transition:leave="modal-leave"
       x-transition:leave-start="modal-leave-start"
       x-transition:leave-end="modal-leave-end"
       x-on:click.outside="close()">
    <div class="modal-header">
      <h3>设置</h3>
      <button class="btn-close" type="button" aria-label="关闭设置" x-on:click="close()">✕</button>
    </div>

    <div class="settings-tabs" role="tablist" aria-label="设置选项">
      <button class="settings-tab"
              type="button"
              data-settings-tab="ai"
              role="tab"
              x-bind:aria-selected="activeTab === 'ai'"
              x-bind:class="activeTab === 'ai' ? 'settings-tab is-active' : 'settings-tab'"
              x-on:click="switchTab('ai')">AI配置</button>
      <button class="settings-tab"
              type="button"
              data-settings-tab="user"
              role="tab"
              x-bind:aria-selected="activeTab === 'user'"
              x-bind:class="activeTab === 'user' ? 'settings-tab is-active' : 'settings-tab'"
              x-on:click="switchTab('user')">用户设置</button>
    </div>

    <div class="modal-body settings-modal-body">
      <section class="settings-panel"
               data-settings-panel="ai"
               role="tabpanel"
               x-show="activeTab === 'ai'"
               x-bind:class="{ 'is-active': activeTab === 'ai' }"
               x-bind:hidden="activeTab !== 'ai'">
        <div class="settings-section-header">
          <div class="settings-section-header__text">
            <h4>🤖 AI配置</h4>
            <p>配置后可直接用于文章生成、注音和翻译。</p>
          </div>
          <div id="config-status" class="config-status config-status--inline">
            <span id="status-icon">❌</span>
            <span id="status-text">未配置</span>
          </div>
        </div>

        <form id="ai-config-form"
              hx-post="/save_ai_config"
              hx-swap="innerHTML"
              hx-target="#ai-config-feedback">
          <div class="settings-form-grid">
            <div class="input-group">
              <input type="text" id="modal-api-key" name="openai_api_key" autocomplete="off" required />
              <label for="modal-api-key">API Key</label>
            </div>
            <div class="input-group">
              <input type="text" id="modal-base-url" name="openai_base_url" autocomplete="off" />
              <label for="modal-base-url">Base URL</label>
            </div>
            <div class="input-group">
              <input type="text" id="modal-model" name="openai_model" autocomplete="off" />
              <label for="modal-model">AI模型 (可自定义)</label>
            </div>
          </div>

          <div class="settings-panel__footer">
            <button type="submit" id="save-config" class="btn-primary"
                    x-bind:disabled="isSubmitting"
                    x-text="isSubmitting ? '保存中…' : '测试并保存'">测试并保存</button>
            <button id="cancel-config" class="btn-secondary" type="button" x-on:click="close()">关闭</button>
          </div>

          {# htmx 把响应片段 swap 进这里。HX-Trigger 事件：ai-config-saved / ai-config-failed #}
          <div id="ai-config-feedback" class="ai-config-feedback" aria-live="polite"></div>
        </form>
      </section>

      <section class="settings-panel"
               data-settings-panel="user"
               role="tabpanel"
               x-show="activeTab === 'user'"
               x-bind:class="{ 'is-active': activeTab === 'user' }"
               x-bind:hidden="activeTab !== 'user'">
        <div class="config-header">
          <div>
            <h4>👤 用户设置</h4>
            <p>调整当前阅读难度等级，让内容更贴近你的水平。</p>
          </div>
        </div>

        <div class="settings-form-grid">
          <div class="input-group">
            <label for="user-level" class="form-label">日语能力等级 (JLPT)</label>
            <select id="user-level" class="form-select">
              <option value="1">N5 - 初学者 (基础词汇和语法)</option>
              <option value="2">N4 - 基础水平 (日常会话)</option>
              <option value="3">N3 - 中级水平 (一般性话题)</option>
              <option value="4">N2 - 中高级水平 (抽象话题)</option>
              <option value="5">N1 - 高级水平 (复杂话题)</option>
            </select>
          </div>
        </div>

        <div class="settings-panel__footer">
          <button id="save-settings" class="btn-primary" type="button"
                  x-on:click="saveUserSettings()"
                  x-bind:disabled="isSubmitting"
                  x-text="isSubmitting ? '保存中…' : '保存设置'">保存设置</button>
          <button id="cancel-settings" class="btn-secondary" type="button" x-on:click="close()">关闭</button>
        </div>
      </section>
    </div>
  </div>
</div>
{% endif %}
